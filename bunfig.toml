[test]
# bun:test covers framework-agnostic TS logic (constants, scripts) alongside the
# Hardhat contract suite (src/test/*.test.ts, run via `hardhat test`). Scoping
# the root to bun-tests/ keeps bun from trying to execute the Solidity tests.
root = "./bun-tests"
exclude = ["node_modules", "dist", "src/test", "artifacts", "cache", "types"]
