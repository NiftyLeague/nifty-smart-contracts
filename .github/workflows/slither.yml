name: Slither analysis

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: slither-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Enable Yarn for Immutable's vendored Seaport build
        run: corepack enable yarn && corepack install --global yarn@1.22.22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Compile contracts
        run: pnpm build
      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          ignore-compile: true
          node-version: 24.18.0
          sarif: results.sarif
          fail-on: low
      - name: Upload SARIF
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
