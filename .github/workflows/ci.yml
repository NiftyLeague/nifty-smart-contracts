name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Enable Yarn for Immutable's vendored Seaport build
        run: corepack enable yarn && corepack install --global yarn@1.22.22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies
      - name: Check formatting
        run: pnpm format:check
      - name: Lint TypeScript
        run: pnpm lint:ts:check
      - name: Lint Solidity
        run: pnpm lint:sol
      - name: Compile contracts
        run: pnpm build
      - name: Type-check
        run: pnpm type-check
      - name: Test with coverage
        run: pnpm test:coverage
      - name: Test contract deployment
        run: pnpm hardhat run --no-compile --network hardhat src/scripts/deploy_test.ts
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
