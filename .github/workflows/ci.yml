name: CI

on:
  push:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: CI / Build, Format, Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - name: Check formatting
        run: bun run format:check
      - name: Lint TypeScript
        run: bun run lint:ts:check
      - name: Lint Solidity
        run: bun run lint:sol
      - name: Compile contracts
        run: bunx hardhat compile
      - name: Type-check
        run: bun run type-check

  test:
    name: CI / Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          cache: true
      - run: bun install --frozen-lockfile
      - name: Compile contracts
        run: bunx hardhat compile
      - name: Test with coverage
        run: bun run test:coverage
      - name: Test contract deployment
        run: bunx hardhat run --no-compile --network hardhat src/scripts/deploy_test.ts
